{{- if .Values.rbac.enable }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: pocketoperated-manager-role
rules:
- apiGroups:
  - baas.pb.simplified
  resources:
  - persistentvolumeclaims
  - persistentvolumes
  - pocketbases
  - pods
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - baas.pb.simplified
  resources:
  - pocketbases/finalizers
  verbs:
  - update
- apiGroups:
  - baas.pb.simplified
  resources:
  - pocketbases/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{- end -}}
